name: Test

on:
  push:
    branches: [master, main]
  pull_request:

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - run: composer install --no-interaction

      - run: composer lint

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Composer dependencies
        run: composer install --no-interaction

      # In CI, use a minimal .wp-env.override.json that only mounts our plugin.
      # Free plugins are installed via WP-CLI after wp-env starts.
      # Commercial plugins (polylang-pro, gravityforms) are not available in CI;
      # their tests skip gracefully.
      - name: Configure wp-env for CI
        run: cp .wp-env.override.json.ci .wp-env.override.json

      - name: Start wp-env
        run: npx @wordpress/env start

      # Install real free plugins from wordpress.org.
      - name: Install integration plugins
        run: |
          npx @wordpress/env run tests-cli wp plugin install \
            polylang wordpress-seo safe-redirect-manager redirection stream \
            --activate

      - name: Activate gds-mcp
        run: npx @wordpress/env run tests-cli wp plugin activate gds-mcp

      # Polylang needs at least one language to function.
      - name: Configure Polylang languages
        run: |
          npx @wordpress/env run tests-cli wp pll lang create English en en_US
          npx @wordpress/env run tests-cli wp pll lang create Finnish fi fi
          npx @wordpress/env run tests-cli wp pll lang create Swedish sv sv_SE

      - name: Run PHPUnit
        run: npx @wordpress/env run tests-cli --env-cwd=wp-content/plugins/gds-mcp vendor/bin/phpunit
