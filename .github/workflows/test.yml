name: Test

on:
  push:
    branches: [master, main]
  pull_request:

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - run: composer install --no-interaction

      - run: composer lint

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Composer dependencies
        run: composer install --no-interaction

      # .wp-env.json references sibling plugin directories.
      # Commercial plugins (polylang-pro, gravityforms) get stubs.
      # Free plugins are installed via WP-CLI after wp-env starts.
      - name: Create stubs for commercial plugins
        run: |
          for plugin in polylang-pro gravityforms; do
            mkdir -p "../$plugin"
            cat > "../$plugin/$plugin.php" <<STUB
          <?php
          /*
          Plugin Name: $plugin (stub)
          Description: CI stub — commercial plugin not available
          Version: 0.0.0
          */
          STUB
          done

      # Free plugins: create minimal stubs so wp-env can mount them,
      # then install real versions via WP-CLI.
      - name: Create mount points for free plugins
        run: |
          for plugin in wordpress-seo safe-redirect-manager redirection stream; do
            mkdir -p "../$plugin"
            cat > "../$plugin/$plugin.php" <<STUB
          <?php
          /*
          Plugin Name: $plugin (mount point)
          Version: 0.0.0
          */
          STUB
          done

      - name: Start wp-env
        run: npx @wordpress/env start

      # Install real free plugins + Polylang free (covers core PLL API).
      - name: Install free plugins
        run: |
          npx @wordpress/env run tests-cli wp plugin install \
            polylang wordpress-seo safe-redirect-manager redirection stream \
            --activate --force

      - name: Activate gds-mcp
        run: npx @wordpress/env run tests-cli wp plugin activate gds-mcp

      # Polylang needs at least one language to function.
      - name: Configure Polylang languages
        run: |
          npx @wordpress/env run tests-cli wp pll lang create English en en_US
          npx @wordpress/env run tests-cli wp pll lang create Finnish fi fi
          npx @wordpress/env run tests-cli wp pll lang create Swedish sv sv_SE

      - name: Run PHPUnit
        run: npx @wordpress/env run tests-cli --env-cwd=wp-content/plugins/gds-mcp vendor/bin/phpunit
